name: validate

on:
  push:
  pull_request:

jobs:
  schema:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validator dependency
        run: python -m pip install --upgrade pip jsonschema

      - name: Run schema tests
        run: python -m unittest tests.test_schema -v

      - name: Confirm spec and site schemas stay identical
        run: diff -u spec/v1/schema.json site/v1/schema.json
