<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VIBEnet Signal Contract Browser Example</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="shell">
      <p class="eyebrow">VIBENET SIGNAL CONTRACT EXAMPLE</p>
      <h1>Browser earcon</h1>
      <p class="lede">One flat signal object drives a visual card and a tiny earcon with no shared backend.</p>

      <section class="card">
        <div class="row">
          <span>Occurred at</span>
          <strong id="occurredAt">-</strong>
        </div>
        <div class="row">
          <span>Producer</span>
          <strong id="producer">-</strong>
        </div>
        <div class="row">
          <span>Entity</span>
          <strong id="entity">-</strong>
        </div>
        <div class="row">
          <span>Event</span>
          <strong id="event">-</strong>
        </div>
        <div class="row">
          <span>Channel</span>
          <strong id="channel">-</strong>
        </div>
        <div class="row">
          <span>State</span>
          <strong id="state">-</strong>
        </div>
        <div class="row">
          <span>Render hints</span>
          <strong id="renderHints">-</strong>
        </div>
        <button id="play" type="button">Play earcon</button>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
